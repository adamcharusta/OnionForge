services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: {{solution-name-lower}}-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./source/api
    container_name: {{solution-name-lower}}-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Database: "Server=mssql;Database={{SolutionName}};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
    ports:
      - "{{ApiPort}}:8080"
    depends_on:
      mssql:
        condition: service_healthy

  web:
    build: ./source/web
    container_name: {{solution-name-lower}}-web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mssql-data:
