name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Uses release-please-config.json and .release-please-manifest.json from the repo root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
